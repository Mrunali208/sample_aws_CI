<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>
body {
    text-align:center;
    font-family:Arial;
    background:#f4f4f4;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

button {
    height:100px;
    font-size:30px;
    cursor:pointer;
    background:white;
    border-radius:10px;
    transition:0.2s;
}

button:hover {
    background:#ddd;
}

.win {
    background:lightgreen !important;
}

.scoreboard {
    font-size:20px;
    margin-top:10px;
}
</style>

<script>
let gameOver = false;

function move(i){
    if(gameOver) return;

    fetch("/move", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"index="+i
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("cell"+i).innerText =
            document.getElementById("player").innerText;

        if(data.status === "win"){
            gameOver = true;

            if(data.combo){
                data.combo.forEach(index => {
                    document.getElementById("cell"+index).classList.add("win");
                });
            }

            if(data.winner === "Draw"){
                setTimeout(()=>{
                    if(confirm("It's a Draw! Play again?")){
                        resetGame();
                    }
                },200);
            } else {
                document.getElementById("scoreX").innerText = data.score.X;
                document.getElementById("scoreO").innerText = data.score.O;

                setTimeout(()=>{
                    if(confirm("Player " + data.winner + " wins! Play again?")){
                        resetGame();
                    }
                },200);
            }

        } else {
            document.getElementById("player").innerText = data.player;
        }
    });
}

function resetGame(){
    fetch("/reset")
    .then(()=>{
        location.reload();
    });
}
</script>
</head>

<body>

<h1>Tic Tac Toe 🎮</h1>

<h2>Current Player: <span id="player">X</span></h2>

<div class="scoreboard">
    X Wins: <span id="scoreX">{{score["X"]}}</span> |
    O Wins: <span id="scoreO">{{score["O"]}}</span>
</div>

<div class="grid">
{% for i in range(9) %}
<button id="cell{{i}}" onclick="move({{i}})"></button>
{% endfor %}
</div>

</body>
</html>
